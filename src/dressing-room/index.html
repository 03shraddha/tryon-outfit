<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dressing Room — Pose</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #fafafa;
        color: #111;
        min-height: 100vh;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px 32px;
        border-bottom: 1px solid #f0f0f0;
        background: #fff;
        gap: 16px;
      }

      .header-left h1 {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        color: #111;
      }

      #status {
        font-size: 11px;
        color: #aaa;
        margin-top: 3px;
        min-height: 16px;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .scan-btn {
        padding: 9px 18px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
      }

      .scan-btn:hover { background: #333; }
      .scan-btn:disabled { background: #e0e0e0; color: #bbb; cursor: default; }

      .generate-btn {
        padding: 9px 18px;
        background: #111;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
        display: none;
      }

      .generate-btn:hover { background: #333; }

      .load-more-btn {
        padding: 9px 18px;
        background: #fff;
        color: #555;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        white-space: nowrap;
        display: none;
      }

      .load-more-btn:hover { background: #f7f7f7; border-color: #ccc; }

      /* Grid */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 2px;
        padding: 2px;
      }

      /* Card */
      .card {
        position: relative;
        aspect-ratio: 3/4;
        overflow: hidden;
        background: #efefef;
        cursor: default;
      }

      .card img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: opacity 0.25s;
      }

      .card .processed { z-index: 1; }

      .card .original {
        opacity: 0;
        z-index: 2;
      }

      .card:hover .original { opacity: 1; }

      .card .domain-tag {
        position: absolute;
        bottom: 10px;
        left: 10px;
        font-size: 10px;
        color: #666;
        background: rgba(255,255,255,0.85);
        padding: 3px 7px;
        border-radius: 3px;
        z-index: 3;
        pointer-events: none;
      }

      .status-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(245,245,245,0.9);
        z-index: 4;
        gap: 8px;
        padding: 0 16px;
      }

      .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid #e0e0e0;
        border-top-color: #999;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .status-label {
        font-size: 10px;
        color: #bbb;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .error-icon {
        font-size: 18px;
        color: #ccc;
      }

      .error-msg {
        font-size: 9px;
        color: #ccc;
        text-align: center;
        line-height: 1.4;
        word-break: break-word;
      }

      /* Empty state */
      .empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 100px 40px;
        color: #ccc;
      }

      .empty h2 {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 10px;
        color: #bbb;
      }

      .empty p {
        font-size: 13px;
        line-height: 1.6;
      }

      .empty strong { color: #999; }

      .hover-hint {
        text-align: right;
        font-size: 10px;
        color: #d0d0d0;
        padding: 10px 16px 6px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-left">
        <h1>POSE · DRESSING ROOM</h1>
        <div id="status"></div>
      </div>
      <div class="header-actions">
        <button class="scan-btn" id="scanBtn">Scan Page</button>
        <button class="generate-btn" id="generateBtn">Generate 3</button>
        <button class="load-more-btn" id="loadMoreBtn">Skip &amp; load more</button>
      </div>
    </div>

    <div class="hover-hint">Hover a result to see the original</div>

    <div class="grid" id="grid"></div>

    <script type="module" src="./dressing-room.ts"></script>
  </body>
</html>
