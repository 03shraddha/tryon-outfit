<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dressing Room — Pose</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #fafafa;
        color: #111;
        min-height: 100vh;
      }

      /* Header */
      .header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        padding: 32px 40px 24px;
        border-bottom: 1px solid #f0f0f0;
      }

      .header-left h1 {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        color: #111;
        margin-bottom: 2px;
      }

      .total-count {
        font-size: 11px;
        color: #bbb;
      }

      .clear-btn {
        background: none;
        border: 1px solid #e8e8e8;
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 11px;
        color: #aaa;
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s;
        white-space: nowrap;
        align-self: center;
      }

      .clear-btn:hover { border-color: #f87171; color: #e53e3e; }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 0;
        padding: 0 40px;
        border-bottom: 1px solid #f0f0f0;
        overflow-x: auto;
        scrollbar-width: none;
        background: #fff;
      }

      .tabs::-webkit-scrollbar { display: none; }

      .tab {
        padding: 14px 16px;
        font-size: 12px;
        color: #aaa;
        cursor: pointer;
        border-bottom: 1px solid transparent;
        white-space: nowrap;
        transition: color 0.15s;
        user-select: none;
      }

      .tab:hover { color: #555; }

      .tab.active {
        color: #111;
        border-bottom-color: #111;
      }

      .tab .tab-count {
        margin-left: 6px;
        font-size: 10px;
        color: #ccc;
      }

      .tab.active .tab-count { color: #999; }

      /* Grid */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 2px;
        padding: 2px;
      }

      /* Card */
      .card {
        position: relative;
        aspect-ratio: 3/4;
        overflow: hidden;
        background: #efefef;
        cursor: pointer;
      }

      .card img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: opacity 0.25s;
      }

      .card .original {
        opacity: 0;
        z-index: 2;
      }

      .card:hover .original { opacity: 1; }

      .card .domain-tag {
        position: absolute;
        bottom: 10px;
        left: 10px;
        font-size: 10px;
        color: #666;
        background: rgba(255,255,255,0.85);
        padding: 3px 7px;
        border-radius: 3px;
        z-index: 3;
        pointer-events: none;
      }

      /* Status overlay for pending/processing */
      .card .status-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
        z-index: 4;
        gap: 8px;
        padding: 0 16px;
      }

      .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid #e0e0e0;
        border-top-color: #999;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      .status-label {
        font-size: 10px;
        color: #bbb;
        letter-spacing: 0.06em;
      }

      .error-icon {
        font-size: 18px;
        color: #ccc;
      }

      .error-msg {
        font-size: 9px;
        color: #ccc;
        text-align: center;
        line-height: 1.4;
        word-break: break-word;
      }

      /* Empty state */
      .empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 80px 40px;
        color: #ccc;
      }

      .empty h2 {
        font-size: 16px;
        font-weight: 500;
        margin-bottom: 8px;
        color: #bbb;
      }

      .empty p {
        font-size: 13px;
        line-height: 1.6;
      }

      /* Hover hint */
      .hover-hint {
        font-size: 11px;
        color: #ccc;
        padding: 16px 40px;
        text-align: right;
      }

      .content { padding: 0; }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-left">
        <h1>POSE · DRESSING ROOM</h1>
        <div class="total-count" id="totalCount">Loading…</div>
      </div>
      <button class="clear-btn" id="clearFailed">Clear Failed</button>
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="hover-hint" id="hoverHint" style="display:none">Hover to see original</div>

    <div class="content">
      <div class="grid" id="grid"></div>
    </div>

    <script type="module" src="./dressing-room.ts"></script>
  </body>
</html>
